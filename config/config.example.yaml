# skill-rollout Configuration
# Copy to ~/.skill-rollout/config.yaml and adjust the path for this machine.
# If this file is missing, resolve_config() falls back to the default below.

paths:
  # Per-plugin rollout state — everything for one target plugin lives at
  # {skill_evals}/{plugin}/: STATUS.md, batch-digest.md, the per-plugin playbook
  # (self-improving-skill-{plugin}.md, generated by the onboarding step), and
  # per-skill loop-log.md/loop-state.json/evals.json. The generic docs (schema,
  # onboarding meta-prompt) ship inside the plugin itself, not here.
  # Absolute paths and ~ both work; no trailing slash.
  skill_evals: "~/projekte/skill-evals"
