# skill-rollout Configuration
# Copy to ~/.skill-rollout/config.yaml and adjust paths for this machine.
# If this file is missing, resolve_config() falls back to the defaults below.

paths:
  # Where your self-improving-skill design docs + per-plugin playbooks
  # (self-improving-skill-*.md) live on THIS machine. Adjust to your setup.
  # Absolute paths and ~ both work; no trailing slash. Example:
  self_improving_docs: "~/Documents/self_improving_skill"

  # Per-plugin eval state (STATUS.md, loop-log.md, batch-digest.md, ...).
  # No trailing slash.
  skill_evals: "~/projekte/skill-evals"
